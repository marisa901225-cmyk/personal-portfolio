changelog:
  categories:
    - title: "기능 추가"
      labels:
        - feature
        - enhancement
    - title: "버그 수정"
      labels:
        - bug
        - fix
    - title: "성능/개선"
      labels:
        - performance
        - refactor
    - title: "문서/운영"
      labels:
        - docs
        - chore
        - ci
  exclude:
    labels:
      - skip-release-notes
