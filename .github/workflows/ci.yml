name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend-check:
    name: Frontend Typecheck, Tests, and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secrets Hygiene Check
        run: bash scripts/check_sensitive_files.sh
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Frontend Typecheck
        run: npm run typecheck --prefix frontend
      - name: Frontend Tests
        run: npm run test:frontend
      - name: Frontend Build
        run: npm run build --prefix frontend

  backend-check:
    name: Backend Environment and Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secrets Hygiene Check
        run: bash scripts/check_sensitive_files.sh
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Node dependencies
        run: npm ci
      - name: Restore Backend Environment and Run Tests
        run: npm run test:backend
