x-backend-env-files: &backend_env_files
  - ./backend/.env
  - ${MYASSET_SECRETS_ENV_FILE:-/home/dlckdgn/ai-models/myasset.secrets.env}

services:
  # Deprecated SYCL backend. Keep commented out unless we explicitly revive it.
  # llama-server:
