services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: myasset-llm
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data:/data:ro
      - ./backend/scripts/run_llm_server.sh:/run.sh:ro
    environment:
      - LLM_MODEL_PATH=/data/EXAONE-4.0-1.2B-BF16.gguf
      - LLM_MODEL_PATH_FILE=/data/llm_model_path.txt
      - LLM_THREADS=4
    entrypoint: [ "/bin/bash", "/run.sh" ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myasset-backend-api
    restart: always
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
      - ./backend/.env:/app/backend/.env
      - /home/dlckdgn/KIS/config:/root/KIS/config
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    environment:
      - PYTHONUNBUFFERED=1
      - LLM_BASE_URL=http://llama-server:8080
      - LLM_REMOTE_DEFAULT_MODEL=EXAONE-4.0-1.2B-BF16.gguf
    env_file:
      - ./backend/.env
    depends_on:
      - llama-server

  alarm-collector:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myasset-alarm-collector
    restart: always
    ports:
      - "0.0.0.0:8001:8001"
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
      - ./backend/.env:/app/backend/.env
      - /home/dlckdgn/KIS/config:/root/KIS/config
    command: uvicorn backend.alarm_collector:app --host 0.0.0.0 --port 8001
    environment:
      - PYTHONUNBUFFERED=1
      - LLM_BASE_URL=http://llama-server:8080
      - LLM_REMOTE_DEFAULT_MODEL=EXAONE-4.0-1.2B-BF16.gguf
    depends_on:
      - llama-server

  news-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myasset-news-scheduler
    restart: always
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
      - ./backend/.env:/app/backend/.env
      - /home/dlckdgn/KIS/config:/root/KIS/config
    command: python backend/scripts/run_news_scheduler.py
    environment:
      - PYTHONUNBUFFERED=1
      - LLM_BASE_URL=http://llama-server:8080
      - LLM_REMOTE_DEFAULT_MODEL=EXAONE-4.0-1.2B-BF16.gguf
    depends_on:
      - llama-server

  sync-prices:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myasset-sync-prices
    restart: always
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
      - ./backend/.env:/app/backend/.env
      - /home/dlckdgn/KIS/config:/root/KIS/config
    command: python backend/scripts/run_sync_prices_scheduler.py
    environment:
      - PYTHONUNBUFFERED=1
      - BACKEND_URL=http://backend-api:8000
      - LLM_BASE_URL=http://llama-server:8080
      - LLM_REMOTE_DEFAULT_MODEL=EXAONE-4.0-1.2B-BF16.gguf
      - TZ=Asia/Seoul
    depends_on:
      - llama-server
