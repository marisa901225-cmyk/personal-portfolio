services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-intel
    container_name: myasset-llm
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /home/dlckdgn/ai-models:/data:ro
      - ./backend/scripts/shell/run_llm_server.sh:/run.sh:ro
    # GPU devices disabled for CPU-only environment
    environment:
      - LLM_MODEL_PATH=/data/Huihui-Qwen3-VL-8B-Thinking-abliterated-Q5_K_M.gguf
      - LLM_MODEL_PATH_FILE=/data/llm_model_path.txt
      - LLM_THREADS=6
      - GGML_SYCL_DEVICE=0
      - GGML_SYCL_FORCE_MMQ=1
      - ZES_ENABLE_SYSMAN=1
    # GPU usage disabled: running on CPU only
    entrypoint: [ "/bin/bash", "/run.sh" ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - appnet

  llama-server-light:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: myasset-llm-light
    restart: always
    ports:
      - "8081:8081"
    volumes:
      - /home/dlckdgn/ai-models:/data:ro
    environment:
      - TZ=Asia/Seoul
    command: >
      --model /data/Qwen3-0.6B-Q8_0.gguf --host 0.0.0.0 --port 8081 --ctx-size 2048 --threads 2
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - appnet

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myasset-backend-api
    restart: always
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
      - ./backend/.env:/app/backend/.env
      - ${KIS_CONFIG_DIR:-/home/dlckdgn/KIS/config}:/root/KIS/config
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    environment:
      - PYTHONUNBUFFERED=1
      - LLM_BASE_URL=http://llama-server:8080
      - LLM_REMOTE_DEFAULT_MODEL=EXAONE-4.0-1.2B-Q8_0.gguf
      - TZ=Asia/Seoul
    env_file:
      - ./backend/.env
    depends_on:
      llama-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - appnet

  alarm-collector:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myasset-alarm-collector
    restart: always
    ports:
      - "0.0.0.0:8001:8001"
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
      - ./backend/.env:/app/backend/.env
      - ${KIS_CONFIG_DIR:-/home/dlckdgn/KIS/config}:/root/KIS/config
    command: python -m backend.scripts.manage run-collector --host 0.0.0.0 --port 8001
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - LLM_BASE_URL=http://llama-server:8080
      - LLM_REMOTE_DEFAULT_MODEL=EXAONE-4.0-1.2B-Q8_0.gguf
      - TZ=Asia/Seoul
    env_file:
      - ./backend/.env
    depends_on:
      llama-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - appnet

  news-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myasset-news-scheduler
    restart: always
    volumes:
      - ./backend:/app/backend
      - ./backend/storage:/app/backend/storage
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
      - ./backend/.env:/app/backend/.env
      - ${KIS_CONFIG_DIR:-/home/dlckdgn/KIS/config}:/root/KIS/config
    command: python -m backend.scripts.manage run-scheduler
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - LLM_BASE_URL=http://llama-server:8080
      - LLM_REMOTE_DEFAULT_MODEL=EXAONE-4.0-1.2B-Q8_0.gguf
      - TZ=Asia/Seoul
    env_file:
      - ./backend/.env
    depends_on:
      llama-server:
        condition: service_healthy
    networks:
      - appnet
    # Resource limits: Crawler + scheduler (moderate CPU during scraping)
    cpus: "1.0"
    mem_limit: "512m"
    pids_limit: 300

  esports-monitor:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myasset-esports-monitor
    restart: unless-stopped
    volumes:
      - ./backend:/app/backend
      - ./backend/storage:/app/backend/storage
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
      - ./backend/.env:/app/backend/.env
    command: python -m backend.scripts.manage listen-esports
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Seoul
    env_file:
      - ./backend/.env
    networks:
      - appnet
    # Resource limits: Light monitoring service
    cpus: "0.50"
    mem_limit: "256m"
    pids_limit: 200

  sync-prices:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myasset-sync-prices
    restart: always
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
      - ./backend/.env:/app/backend/.env
      - ${KIS_CONFIG_DIR:-/home/dlckdgn/KIS/config}:/root/KIS/config
    command: python -m backend.scripts.runners.run_sync_prices_scheduler
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - BACKEND_URL=http://backend-api:8000
      - LLM_BASE_URL=http://llama-server:8080
      - AI_REPORT_MODEL=gpt-5.1
      - AI_REPORT_TIMEOUT_SEC=900
      - LLM_REMOTE_DEFAULT_MODEL=Huihui-Qwen3-VL-8B-Thinking-abliterated-Q5_K_M.gguf
      - TZ=Asia/Seoul
    env_file:
      - ./backend/.env
    depends_on:
      llama-server:
        condition: service_healthy
      backend-api:
        condition: service_healthy
    networks:
      - appnet
    # Resource limits: Scheduler + LLM calls (needs more resources)
    cpus: "1.5"
    mem_limit: "768m"
    pids_limit: 400

networks:
  appnet:
    driver: bridge
