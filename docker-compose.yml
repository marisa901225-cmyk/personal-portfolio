services:
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myasset-backend-api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend/data:/app/backend/data
      - ./backend/.env:/app/backend/.env
      - /home/dlckdgn/KIS/config:/root/KIS/config
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    environment:
      - PYTHONUNBUFFERED=1

  alarm-collector:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myasset-alarm-collector
    restart: always
    ports:
      - "8001:8001"
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend/data:/app/backend/data
      - ./backend/.env:/app/backend/.env
      - /home/dlckdgn/KIS/config:/root/KIS/config
    command: uvicorn backend.alarm_collector:app --host 0.0.0.0 --port 8001
    environment:
      - PYTHONUNBUFFERED=1

  news-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myasset-news-scheduler
    restart: always
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend/data:/app/backend/data
      - ./backend/.env:/app/backend/.env
      - /home/dlckdgn/KIS/config:/root/KIS/config
    command: python backend/scripts/run_news_scheduler.py
    environment:
      - PYTHONUNBUFFERED=1

  sync-prices:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myasset-sync-prices
    restart: always
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend/data:/app/backend/data
      - ./backend/.env:/app/backend/.env
      - /home/dlckdgn/KIS/config:/root/KIS/config
    command: python backend/scripts/run_sync_prices_scheduler.py
    environment:
      - PYTHONUNBUFFERED=1
      - BACKEND_URL=http://backend-api:8000
      - TZ=Asia/Seoul
