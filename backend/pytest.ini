[pytest]
testpaths = tests
python_files = test_*.py
python_classes = *Tests
python_functions = test_*
norecursedirs = scripts data storage venv .venv .git __pycache__
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    integration: marks tests as integration tests requiring external dependencies (deselected by default)

# Default: skip integration tests
addopts = -m "not integration"

